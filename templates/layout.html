<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería Flask</title>
    <link rel="stylesheet" href="{{url_for('static',filename='dist/output.css')}}">
</head>
<body>
    <nav class="bg-gray-800 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-xl font-bold">Pizzería</a>
            
            <div class="space-x-4">
                <a href="/" class="hover:text-gray-300">Inicio</a>
                <a href="{{ url_for('pedidos') }}" class="hover:text-gray-300">Nuevo Pedido</a>
                <a href="{{ url_for('ventas_dia') }}" class="hover:text-gray-300">Ventas por Día</a>
                <a href="{{ url_for('ventas_mes') }}" class="hover:text-gray-300">Ventas por Mes</a>
            </div>
        </div>
    </nav>
   
    <div class="container mx-auto p-4">
        <!-- Mensajes Flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-4 p-3 rounded 
                        {% if category == 'success' %}bg-green-100 text-green-800
                        {% elif category == 'error' %}bg-red-100 text-red-800
                        {% else %}bg-blue-100 text-blue-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block container %}
        {% endblock %}
    </div>
</body>
</html>
